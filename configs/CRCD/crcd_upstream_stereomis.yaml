# LITERAL upstream DDS-SLAM-Base StereoMIS values + CRCD intrinsics + CRCD-scene
# bound. Used as the ablation chain's starting point. Every value here is taken
# verbatim from DDS-SLAM-Base/configs/StereoMIS/stereomis.yaml EXCEPT:
#   * cam.{H,W,fx,fy,cx,cy} — match CRCD's rectified left-camera intrinsics
#   * cam.png_depth_scale — match CRCD's MoGe-2 PNG convention (10000)
#   * (no bound) — must be set per-snippet by the variant yaml
#
# Do NOT inherit from configs/CRCD/crcd.yaml — that file has already been
# modified with Recipe A + hash_size=19. This base intentionally REVERTS to
# upstream so each ablation step's effect is visible in isolation.

dataset: 'stereomis'
multiscale_res: [1, 2, 4]
dynamic: True
render_freq: 10   # paper has 100 for StereoMIS; bumped here so ablation runs
                  # produce ~27 renders for PSNR/SSIM/LPIPS measurement
data:
  downsample: 1
  sc_factor: 1
  translation: 0
  num_workers: 0

mapping:
  sample: 2048
  first_mesh: True
  iters: 10                # upstream StereoMIS
  cur_frame_iters: 0       # upstream StereoMIS
  lr_embed: 0.01
  lr_decoder: 0.01
  lr_rot: 0.001            # upstream StereoMIS
  lr_trans: 0.001          # upstream StereoMIS
  keyframe_every: 5        # upstream StereoMIS
  map_every: 5             # upstream StereoMIS
  n_pixels: 0.05
  first_iters: 200         # upstream StereoMIS
  optim_cur: True
  min_pixels_cur: 1024
  map_accum_step: 1
  pose_accum_step: 5
  map_wait_step: 0
  filter_depth: False

tracking:
  iter: 10                 # upstream StereoMIS
  sample: 1024
  pc_samples: 40960
  lr_rot: 0.001            # upstream StereoMIS
  lr_trans: 0.001          # upstream StereoMIS
  ignore_edge_W: 1
  ignore_edge_H: 1
  iter_point: 0
  wait_iters: 100
  const_speed: True
  best: True

grid:
  enc: 'HashGrid'
  tcnn_encoding: True
  hash_size: 16            # upstream StereoMIS
  voxel_color: 0.08
  voxel_sdf: 0.002         # upstream StereoMIS
  oneGrid: True
  resolution: [64, 64, 64, 100]

pos:
  enc: 'OneBlob'
  n_bins: 16

decoder:
  geo_feat_dim: 15
  hidden_dim: 32
  num_layers: 2
  num_layers_color: 2
  hidden_dim_color: 64
  hidden_dim_time: 128
  num_layers_time: 4
  tcnn_network: false
  learnable_beta: true

cam:
  # CRCD-specific (NOT upstream — upstream is 512x640 @ fx=516.95)
  H: 720
  W: 1280
  fx: 1096.69619
  fy: 1096.69619
  cx: 622.807617
  cy: 383.12598
  png_depth_scale: 10000   # CRCD MoGe convention (upstream StereoMIS is 100)
  crop_edge: 0
  near: 0
  far: 2                   # upstream StereoMIS (literal)
  depth_trunc: 10.

training:
  rgb_weight: 5.0
  depth_weight: 0.1
  sdf_weight: 1000
  fs_weight: 10
  plane_tv_weight: 0.0002
  l1_time_planes: 0.0001
  time_smoothness_weight: 0.001
  eikonal_weight: 0
  smooth_weight: 0.000001
  smooth_pts: 32
  smooth_vox: 0.1
  smooth_margin: 0.05
  n_samples_d: 32
  range_d: 0.05
  n_range_d: 16            # upstream StereoMIS (paper-correct)
  n_importance: 0
  perturb: 1
  white_bkgd: False
  trunc: 0.1
  rot_rep: 'axis_angle'
  rgb_missing: 0.05

mesh:
  resolution: 512
  render_color: False
  vis: 500
  voxel_eval: 0.05
  voxel_final: 0.02
  visualisation: False
