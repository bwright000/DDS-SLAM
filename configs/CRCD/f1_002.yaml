# Paper-faithful corrections from the SemSup recreation breakthrough
# (project_paper_recreation_breakthrough_20260602):
#   - grid.hash_size 16 -> 19 (8x bigger hash table; matches encodings.py default)
# Inherits training.n_range_d: 16 from crcd.yaml (already paper-correct, no
# change vs. SemSup which had n_range_d: 11). Paper-faithful on SemSup
# produced PSNR 30.148 / SSIM 0.804 / LPIPS 0.311 vs paper 28.649 / 0.797 / 0.231
# (beats paper on PSNR + SSIM). Applying the same hash-size correction to
# CRCD with MoGe-2 depth on the F_1/002 surgical snippet.
grid:
  hash_size: 19
