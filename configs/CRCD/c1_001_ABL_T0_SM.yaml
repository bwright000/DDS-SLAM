# Ablation T0_SM — LITERAL upstream DDS-SLAM-Base StereoMIS values on CRCD C_1/001.
# This is the rollback baseline. No paper-faithful corrections, no Recipe A,
# no depth rescale, no CRCD-scene-appropriate bound. Hash 16, voxel_sdf 0.002,
# iters 10, first_iters 200, lr 1e-3. Depth ×1.0 (MoGe native).
#
# Bound = literal upstream DDS-SLAM-Base/configs/StereoMIS/p2_1.yaml values:
#     [[-1.8, 2.1], [-2, 1.2], [-0.1, 2.7]]
# This is a 3.9 x 3.2 x 2.8 m room-scale box. Applied to a 0.1-0.2 m endoscope
# scene, the top-level hash-grid resolution at voxel_sdf=0.002 is 3.9/0.002 =
# 1950 voxels per axis. Hash 2^16 = 65k buckets => collision factor ~6 x 10^4.
# This is exactly the point of the test: see what literal upstream produces
# on CRCD before any of our adaptations.
#
# Expected: high SE3 ATE (MoGe scale ×1.0 still wrong by ~50x) AND likely
# degraded render quality (collision soup). Render quality may surprise if
# the hash grid degrades gracefully — that itself is informative.

inherit_from: configs/CRCD/crcd_upstream_stereomis.yaml
timesteps: 271

mapping:
  bound: [[-1.8,2.1],[-2,1.2],[-0.1,2.7]]
  marching_cubes_bound: [[-1.8,2.1],[-2,1.2],[-0.1,2.7]]

data:
  datadir: data/CRCD/C1_001
  trainskip: 1
  output: output/CRCD/C1_001_ABL_T0_SM
  exp_name: demo
