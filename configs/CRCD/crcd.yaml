dataset: 'stereomis'
multiscale_res: [1, 2, 4]
dynamic: True
render_freq: 100
data:
  downsample: 1
  sc_factor: 1
  translation: 0
  num_workers: 0

mapping:
  sample: 2048
  first_mesh: True
  iters: 10
  cur_frame_iters: 0
  lr_embed: 0.01
  lr_decoder: 0.01
  lr_rot: 0.001
  lr_trans: 0.001
  keyframe_every: 5
  map_every: 5
  n_pixels: 0.05
  first_iters: 200
  optim_cur: True
  min_pixels_cur: 1024
  map_accum_step: 1
  pose_accum_step: 5
  map_wait_step: 0
  filter_depth: False

tracking:
  iter: 10
  sample: 1024
  pc_samples: 40960
  lr_rot: 0.001
  lr_trans: 0.001
  ignore_edge_W: 1
  ignore_edge_H: 1
  iter_point: 0
  wait_iters: 100
  const_speed: True
  best: True

grid:
  enc: 'HashGrid'
  tcnn_encoding: True
  # Run 3A (2026-04-22): reverted to stock capacity after Run 2's catastrophic
  # PSNR collapse (11.94 dB). The 8x hash + 2x finest-voxel bump outpaced the
  # 200 first_iters training budget -> under-converged canonical scene with
  # visible black holes in render. 4 sampling-param changes (far/depth_trunc/
  # trunc/range_d) kept.
  hash_size: 16
  voxel_color: 0.08
  voxel_sdf: 0.002
  oneGrid: True
  resolution: [64, 64, 64, 100]

pos:
  enc: 'OneBlob'
  n_bins: 16

decoder:
  geo_feat_dim: 15
  hidden_dim: 32
  num_layers: 2
  num_layers_color: 2
  hidden_dim_color: 64
  hidden_dim_time: 128
  num_layers_time: 4
  tcnn_network: false
  learnable_beta: true

cam:
  H: 720
  W: 1280
  fx: 1096.69619
  fy: 1096.69619
  cx: 622.807617
  cy: 383.12598
  png_depth_scale: 10000
  crop_edge: 0
  near: 0
  # Run 2 tuning: CRCD scene tops out at ~0.14 m depth; uniform sampling to
  # far=1 m was wasting 30/32 samples in empty space (verified zval_max=1.0
  # in apr22 debug CSV). depth_trunc likewise never fired on close-range
  # scene; tightening rejects RAFT outliers.
  far: 0.1
  depth_trunc: 0.1

training:
  rgb_weight: 5.0
  depth_weight: 0.1
  sdf_weight: 1000
  fs_weight: 10
  plane_tv_weight: 0.0002
  l1_time_planes: 0.0001
  time_smoothness_weight: 0.001
  eikonal_weight: 0
  smooth_weight: 0.000001
  smooth_pts: 32
  smooth_vox: 0.1
  smooth_margin: 0.05
  n_samples_d: 32
  # Run 2 tuning: scene depth range is only 25 mm (18-43 mm), so
  # range_d 0.05 -> 0.005 keeps the 16 surface-adjacent samples inside
  # the scene. trunc 0.1 -> 0.005 activates fs_loss (was dead, n_fs=0
  # on 267/271 frames in apr22 CSV) and tightens SDF band.
  range_d: 0.005
  n_range_d: 16
  n_importance: 0
  perturb: 1
  white_bkgd: False
  trunc: 0.005
  rot_rep: 'axis_angle'
  rgb_missing: 0.05

mesh:
  resolution: 512
  render_color: False
  vis: 500
  voxel_eval: 0.05
  voxel_final: 0.02
  visualisation: False
