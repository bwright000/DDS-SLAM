dataset: 'stereomis'
multiscale_res: [1, 2, 4]
dynamic: True
render_freq: 100
data:
  downsample: 1
  sc_factor: 1
  translation: 0
  num_workers: 0

mapping:
  sample: 2048
  first_mesh: True
  # Recipe A (project_dds_slam_config_knob_deepdive_20260604):
  #   iters       10 -> 20    (per-keyframe mapping refinement; paper says k=5/iters=10
  #                            for long StereoMIS, k=1/iters=200 for short SemSup. CRCD
  #                            sits between; 20 is the conservative Recipe A step that
  #                            survived the 7-investigator adversarial filter)
  #   first_iters 200 -> 1000 (matches Super.yaml; under-trained canonical anchor on
  #                            real surgical specular data was the #1 hypothesis)
  # Variants that need the old StereoMIS-inherited schedule (e.g. the 2026-06-04
  # 3-test paper_faithful + paper_faithful_depthx0p3 baselines) MUST pin
  # iters: 10 + first_iters: 200 explicitly.
  iters: 20
  cur_frame_iters: 0
  lr_embed: 0.01
  lr_decoder: 0.01
  lr_rot: 0.001
  lr_trans: 0.001
  keyframe_every: 5
  map_every: 5
  n_pixels: 0.05
  first_iters: 1000
  optim_cur: True
  min_pixels_cur: 1024
  map_accum_step: 1
  pose_accum_step: 5
  map_wait_step: 0
  filter_depth: False

tracking:
  iter: 10
  sample: 1024
  pc_samples: 40960
  lr_rot: 0.001
  lr_trans: 0.001
  ignore_edge_W: 1
  ignore_edge_H: 1
  iter_point: 0
  wait_iters: 100
  const_speed: True
  best: True

grid:
  enc: 'HashGrid'
  tcnn_encoding: True
  # hash_size 16 -> 19 (project_paper_recreation_breakthrough_20260602):
  # SemSup isolated ablation showed +0.888 dB PSNR / -0.034 LPIPS from this
  # alone (28% of the paper gap). encodings.py default is 19; the previous
  # 16 was an 8x undersized hash table that aliases at the top resolution
  # level. paper-faithful CRCD variants (c1_001_paper_faithful, f1_002, etc)
  # have run with 19 since 2026-06-02 with no regression — base config catches
  # up here. StereoMIS deliberately HELD at 16 in stereomis.yaml pending the
  # isolated P2_1 last-4000 sweep (project_dds_slam_config_knob_deepdive_20260604
  # Rank 5).
  hash_size: 19
  voxel_color: 0.08
  # voxel_sdf 0.002 -> 0.001 (Run 4, 2026-04-22): doubles linear scene
  # resolution (12 -> 25 voxels across the 25 mm CRCD scene). In isolation
  # with hash_size=16 this REGRESSED catastrophically (Run 4: ATE 2.20 ->
  # 788 mm) due to hash-table collision pressure at the new resolution. The
  # finer voxel grid is now safe BECAUSE hash_size=19 is in force above
  # (Recipe C constraint: voxel_sdf finer ONLY if hash_size >= 19).
  voxel_sdf: 0.001
  oneGrid: True
  resolution: [64, 64, 64, 100]

pos:
  enc: 'OneBlob'
  n_bins: 16

decoder:
  geo_feat_dim: 15
  hidden_dim: 32
  num_layers: 2
  num_layers_color: 2
  hidden_dim_color: 64
  hidden_dim_time: 128
  num_layers_time: 4
  tcnn_network: false
  learnable_beta: true

cam:
  H: 720
  W: 1280
  fx: 1096.69619
  fy: 1096.69619
  cx: 622.807617
  cy: 383.12598
  png_depth_scale: 10000
  crop_edge: 0
  near: 0
  far: 1
  depth_trunc: 10.

training:
  rgb_weight: 5.0
  depth_weight: 0.1
  sdf_weight: 1000
  fs_weight: 10
  plane_tv_weight: 0.0002
  l1_time_planes: 0.0001
  time_smoothness_weight: 0.001
  eikonal_weight: 0
  smooth_weight: 0.000001
  smooth_pts: 32
  smooth_vox: 0.1
  smooth_margin: 0.05
  n_samples_d: 32
  range_d: 0.05
  n_range_d: 16
  n_importance: 0
  perturb: 1
  white_bkgd: False
  trunc: 0.1
  rot_rep: 'axis_angle'
  rgb_missing: 0.05

mesh:
  resolution: 512
  render_color: False
  vis: 500
  voxel_eval: 0.05
  voxel_final: 0.02
  visualisation: False
