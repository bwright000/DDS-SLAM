# Battery-3 (revival sweep, 2-axis λ × lr). Field diverges instantly when freed (battery-2:
# 6.6e15 by t=1), so lr control is decisive: slow lr (lr_mult 0.1) lets the ||dx||^2 reg ramp
# up before the field escapes. wd=0 throughout (reg is the sole stabilizer). pose-frozen.
# wd0_slowlr: deformation_reg_weight=0.0, timenet_lr_mult=0.1.
inherit_from: configs/Super/hyp2_posefrozen.yaml
training:
  timenet_weight_decay: 0.0
  deformation_reg_weight: 0.0
  timenet_lr_mult: 0.1
data:
  output: output/hyp3_wd0_slowlr
  exp_name: demo
