inherit_from: configs/Super/trail3.yaml

# ============================================================================
# Fix 1: tighten tracker to eliminate flat-loss-region walk-away
# ----------------------------------------------------------------------------
# Hypothesis: quantised depth supervision creates a ~cm-scale flat region in
# the tracking loss around each frame's true pose. Baseline tracker walks
# ~2mm per frame inside that region under gradient noise. Reducing lr_trans
# and raising iter caps the per-frame walk.
#
# Baseline (trail3.yaml -> Super.yaml):
#   tracking: { iter: 20, lr_rot: 0.0001, lr_trans: 0.0001 }
#   Theoretical walk cap per frame: 0.0001 * 20 = 2.0 mm
#
# Fix 1 (this file):
#   tracking: { iter: 50, lr_rot: 0.00005, lr_trans: 0.00001 }
#   Theoretical walk cap per frame: 0.00001 * 50 = 0.5 mm (4x reduction)
#   More iterations give Adam time to converge inside the flat region before
#   running out of budget.
#
# Expected outcome on SemSup trail3+MoGe:
#   Baseline: ATE ~60 mm (identity GT; drift under noise).
#   Fix 1:    ATE target <= 15 mm. Per-frame translation delta median <= 0.25 mm.
# ============================================================================

tracking:
  iter: 50
  lr_rot: 0.00005
  lr_trans: 0.00001

data:
  output: output/trail3_fix1
  exp_name: demo
